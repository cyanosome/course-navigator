services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # ローカル開発時のダッシュボード確認用
    networks:
      - gateway
    environment:
      TZ: ${TZ}
    env_file:
      - .env
    labels:
      traefik.enable: true
      # ドメイン設定を環境変数化
      traefik.http.routers.dashboard.rule: Host(`${DOMAIN}`) && PathPrefix(`/dashboard`)
      traefik.http.routers.dashboard.middlewares: auth
      traefik.http.routers.dashboard.entrypoints: web # 本番時は websecure に変更して自動TLSを使用
      traefik.http.routers.dashboard.service: api@internal
      traefik.http.middlewares.auth.basicauth.users: ${DASHBOARD_AUTH}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./letsencrypt:/letsencrypt
      - ./logs:/logs

networks:
  gateway:
    external: true